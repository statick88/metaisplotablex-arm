# MetaIsplotableX — Docker Compose
# Uso: docker compose up -d / docker compose down
services:
  metaisplotablex:
    image: metasploitable3-arm:latest
    container_name: metaisplotablex
    hostname: metaisplotablex
    restart: unless-stopped
    ports:
      - "2222:22"
      - "8080:8080"
      - "2121:2121"
      - "3306:3306"
      - "6379:6379"
      - "6200:6200"
      - "6667:6667"
      - "8009:8009"
      - "8585:8585"
    networks:
      metisplotablenet:
        ipv4_address: 172.20.0.10
    cap_add:
      - NET_ADMIN
    volumes:
      - metaisplotablex_db:/var/lib/mysql
      - metaisplotablex_logs:/var/log/supervisor
    environment:
      - TZ=UTC
networks:
  metisplotablenet:
    driver: bridge
volumes:
  metaisplotablex_db:
  metaisplotablex_logs:
