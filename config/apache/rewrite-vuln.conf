# CVE-2024-38474 — mod_rewrite encoding substitution flaw
# Allows execution of scripts in unreachable directories via encoded path
# Trigger: GET /vuln/..%2f..%2fetc%2fpasswd or similar encoded traversal
<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteRule ^/vuln/(.*)$ /var/www/html/dvwa/$1 [PT,L]
</IfModule>
