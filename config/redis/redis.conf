# Redis — CVE-2022-0543 Lua sandbox escape + unauthenticated RCE
# No password, bind all interfaces, no protected-mode
bind 0.0.0.0
protected-mode no
port 6379
# No requirepass — allows CONFIG SET dir/dbfilename for filesystem write RCE
# Metasploit: exploit/linux/redis/redis_replication_cmd_exec
loglevel notice
logfile /var/log/redis/redis-server.log
dir /var/lib/redis
